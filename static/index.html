<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Virtual Try-On | Sanal Deneme Kabini</title>
    <meta name="description" content="Kıyafetlerinizi fotoğraflayın, 3 boyutlu olarak görüntüleyin ve sanal gardırobunuzu oluşturun.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0d0f14;
            --surface:    #161921;
            --surface2:   #1e2130;
            --border:     #2a2f42;
            --accent:     #6c63ff;
            --accent2:    #a78bfa;
            --success:    #22c55e;
            --warning:    #f59e0b;
            --danger:     #ef4444;
            --gold:       #f59e0b;
            --text:       #e2e8f0;
            --text-muted: #8892a4;
            --radius:     14px;
            --radius-sm:  8px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 2.5rem; padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
        header p  { font-size: .85rem; color: var(--text-muted); margin-top: .2rem; }

        /* ── API Key Settings Panel ───────────────────────── */
        .settings-bar {
            display: flex; align-items: center; gap: .75rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: .85rem 1.25rem;
            margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .settings-bar > label {
            font-size: .78rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .07em; white-space: nowrap;
        }
        .key-input-wrap {
            position: relative; flex: 1; min-width: 240px;
        }
        .key-input-wrap input {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: .55rem 2.5rem .55rem .85rem;
            color: var(--text); font-size: .88rem; font-family: monospace;
            transition: border-color .2s;
        }
        .key-input-wrap input:focus { outline: none; border-color: var(--accent); }
        .key-input-wrap input::placeholder { color: var(--text-muted); font-family: 'Inter',sans-serif; }
        .eye-btn {
            position: absolute; right: .6rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: .9rem; padding: .2rem;
        }
        .eye-btn:hover { color: var(--accent2); }
        .key-status {
            font-size: .75rem; white-space: nowrap;
            padding: .3rem .75rem; border-radius: 20px;
        }
        .key-status.active   { background: rgba(34,197,94,.15);  color: var(--success); }
        .key-status.inactive { background: rgba(148,163,184,.12); color: var(--text-muted); }

        /* ── Upload Card ─────────────────────────────────────────── */
        .upload-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem; margin-bottom: 2rem;
            transition: border-color .25s;
        }
        .upload-card:hover { border-color: var(--accent); }
        .upload-card h2 {
            font-size: .85rem; font-weight: 600; margin-bottom: 1.25rem;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em;
        }
        .upload-row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: .4rem; flex: 1; min-width: 200px; }
        label { font-size: .78rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }

        input[type="file"] {
            background: var(--surface2); border: 1px dashed var(--border);
            border-radius: var(--radius-sm); padding: .65rem .9rem;
            color: var(--text); font-size: .9rem; cursor: pointer;
        }
        input[type="file"]:hover { border-color: var(--accent); }
        input[type="file"]::file-selector-button {
            background: var(--accent); color: #fff; border: none;
            padding: .3rem .7rem; border-radius: 6px; font-size: .8rem;
            cursor: pointer; margin-right: .5rem;
        }
        select {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: .65rem .9rem;
            color: var(--text); font-size: .9rem; cursor: pointer;
        }
        select:focus { outline: none; border-color: var(--accent); }

        .btn {
            padding: .7rem 1.5rem; border: none; border-radius: var(--radius-sm);
            font-size: .95rem; font-weight: 600; cursor: pointer;
            transition: all .2s; white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,.35);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(108,99,255,.5); }
        .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; }

        /* ── Progress Bar ────────────────────────────────────────── */
        #progress-wrap {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
        }
        .progress-label {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: .75rem;
        }
        .progress-message {
            font-size: .9rem; color: var(--text-muted); font-weight: 500;
        }
        .progress-pct {
            font-size: .85rem; font-weight: 700; color: var(--accent2);
        }
        .progress-track {
            width: 100%; height: 10px;
            background: var(--surface2); border-radius: 99px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .5s ease;
            width: 0%;
        }
        .progress-step {
            margin-top: .7rem; font-size: .78rem; color: var(--text-muted);
            font-family: monospace; letter-spacing: .03em;
        }
        .progress-fill.pulsing {
            animation: shimmer 1.5s infinite linear;
            background-size: 200% 100%;
            background-image: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 50%, var(--accent) 100%);
        }
        @keyframes shimmer { 0%{ background-position: 200% 0 } 100%{ background-position: -200% 0 } }

        /* ── Current Job Results ─────────────────────────────────── */
        #results { display: none; gap: 1.5rem; margin-bottom: 2.5rem; grid-template-columns: 1fr 1fr; }
        @media (max-width: 700px) { #results { grid-template-columns: 1fr; } }
        .result-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.25rem; text-align: center;
        }
        .result-box h3 { font-size: .9rem; color: var(--text-muted); margin-bottom: 1rem; }
        img.preview { max-width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        model-viewer { width: 100%; height: 350px; background: var(--surface2); border-radius: var(--radius-sm); }

        /* ── Wardrobe Section ────────────────────────────────────── */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.25rem;
        }
        .section-header h2 { font-size: 1.1rem; font-weight: 700; }
        .refresh-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-muted); font-size: .8rem; padding: .35rem .9rem;
            border-radius: 20px; cursor: pointer; transition: all .2s;
        }
        .refresh-btn:hover { border-color: var(--accent); color: var(--accent2); }

        #wardrobe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
            gap: 1.25rem;
        }

        /* ── Garment Card ────────────────────────────────────────── */
        .garment-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            transition: transform .22s, border-color .22s, box-shadow .22s;
            position: relative;
        }
        .garment-card:hover {
            transform: translateY(-4px); border-color: var(--accent);
            box-shadow: 0 12px 36px rgba(108,99,255,.2);
        }
        .garment-card.is-favorite {
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(245,158,11,.15);
        }
        .garment-card.is-favorite:hover {
            box-shadow: 0 12px 36px rgba(245,158,11,.25);
        }

        /* Favorite star badge top-right */
        .fav-star {
            position: absolute; top: .6rem; right: .6rem;
            font-size: 1rem; line-height: 1;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,.5));
            display: none;
        }
        .garment-card.is-favorite .fav-star { display: block; }

        .card-img-wrap {
            width: 100%; height: 170px;
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
        .garment-card:hover .card-img-wrap img { transform: scale(1.04); }
        .card-img-placeholder { font-size: 2.5rem; color: var(--border); }

        .card-body { padding: .85rem 1rem 1rem; }

        /* Editable name */
        .card-name {
            font-size: .9rem; font-weight: 600; color: var(--text);
            margin-bottom: .3rem; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-type {
            font-size: .72rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem;
        }

        /* Badge */
        .badge {
            display: inline-flex; align-items: center; gap: .35rem;
            padding: .22rem .65rem; border-radius: 20px;
            font-size: .72rem; font-weight: 600; letter-spacing: .04em;
        }
        .badge-queued     { background: rgba(148,163,184,.15); color: #94a3b8; }
        .badge-processing { background: rgba(245,158,11,.15);  color: var(--warning); }
        .badge-completed  { background: rgba(34,197,94,.15);   color: var(--success); }
        .badge-failed     { background: rgba(239,68,68,.12);   color: var(--danger); }
        .badge::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
        .badge-processing::before { animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        .card-error {
            margin-top: .5rem; font-size: .71rem; color: var(--danger);
            background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
            border-radius: 6px; padding: .35rem .55rem; line-height: 1.5;
        }

        /* Card action row */
        .card-actions {
            display: flex; gap: .5rem; margin-top: .7rem; align-items: center;
        }
        .card-model-btn {
            flex: 1; text-align: center; padding: .35rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff; border-radius: 6px; font-size: .75rem; font-weight: 600;
            cursor: pointer; border: none; transition: opacity .2s;
        }
        .card-model-btn:hover { opacity: .85; }
        .icon-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-muted); border-radius: 6px; padding: .32rem .55rem;
            font-size: .85rem; cursor: pointer; transition: all .18s; line-height: 1;
        }
        .icon-btn:hover { background: var(--surface); }
        .icon-btn.fav-btn:hover  { border-color: var(--gold);   color: var(--gold); }
        .icon-btn.edit-btn:hover { border-color: var(--accent2); color: var(--accent2); }
        .icon-btn.del-btn:hover  { border-color: var(--danger);  color: var(--danger); }

        /* Empty/loading */
        .wardrobe-empty {
            grid-column: 1/-1; text-align: center;
            padding: 3rem 1rem; color: var(--text-muted); font-size: .9rem;
        }
        .wardrobe-empty span { font-size: 2.5rem; display: block; margin-bottom: .75rem; }

        /* ── 3D Modal ──────────────────────────────────────────────── */
        #model-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
            z-index: 999; align-items: center; justify-content: center;
        }
        #model-modal.open { display: flex; }
        .modal-inner {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.5rem;
            width: min(640px, 95vw); position: relative;
        }
        .modal-close {
            position: absolute; top: 1rem; right: 1rem;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { border-color: var(--danger); color: var(--danger); }
        #modal-viewer { width: 100%; height: 400px; border-radius: var(--radius-sm); background: var(--surface2); }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <header>
        <div class="logo">👕</div>
        <div>
            <h1>3D Virtual Try-On</h1>
            <p>Kıyafetlerinizi yükleyin, 3D modele dönüştürün, sanal gardırobunuzu yönetin.</p>
        </div>
    </header>

    <!-- BYOK API Key Settings -->
    <div class="settings-bar">
        <label for="tripoApiKey">🔑 Tripo3D API Key</label>
        <div class="key-input-wrap">
            <input type="password" id="tripoApiKey"
                placeholder="Kendi Tripo3D API anahtarinizi girin (opsiyonel — bos birakabilirsiniz)"
                oninput="saveApiKey(this.value)"
                autocomplete="off" spellcheck="false">
            <button class="eye-btn" onclick="toggleKeyVisibility()" title="Goster / Gizle">👁</button>
        </div>
        <span class="key-status inactive" id="keyStatus">Sistem anahtari</span>
    </div>

    <!-- Upload -->
    <div class="upload-card">
        <h2>Yeni Kıyafet Yükle</h2>
        <div class="upload-row">
            <div class="field">
                <label for="imageInput">Fotoğraf Seç</label>
                <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp">
            </div>
            <div class="field" style="max-width:200px;">
                <label for="garmentType">Kıyafet Türü</label>
                <select id="garmentType">
                    <option value="shirt">Gömlek / T-Shirt</option>
                    <option value="pants">Pantolon</option>
                    <option value="dress">Elbise</option>
                    <option value="jacket">Ceket</option>
                    <option value="skirt">Etek</option>
                </select>
            </div>
            <button id="uploadBtn" class="btn btn-primary" onclick="uploadGarment()">🚀 Yükle ve Dönüştür</button>
        </div>
    </div>

    <!-- Progress Bar (log yerine) -->
    <div id="progress-wrap">
        <div class="progress-label">
            <span class="progress-message" id="progress-message">Kıyafetiniz işleniyor...</span>
            <span class="progress-pct" id="progress-pct">%0</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill pulsing" id="progress-fill"></div>
        </div>
        <div class="progress-step" id="progress-step">Başlatılıyor...</div>
    </div>

    <!-- Active Job Results -->
    <div id="results" style="display:grid;">
        <div class="result-box">
            <h3>✨ Temizlenmiş 2D Görsel</h3>
            <img id="cleanedImage" class="preview" src="" alt="Arka planı temizlenmiş kıyafet">
        </div>
        <div class="result-box">
            <h3>🧊 3D Model</h3>
            <model-viewer id="modelViewer" src="" auto-rotate camera-controls shadow-intensity="1" alt="3D Kıyafet Modeli"></model-viewer>
        </div>
    </div>

    <!-- Wardrobe Gallery -->
    <div class="section-header">
        <h2>👗 Sanal Gardırobum</h2>
        <button class="refresh-btn" onclick="loadWardrobe()">↻ Yenile</button>
    </div>
    <div id="wardrobe-grid">
        <div class="wardrobe-empty"><span>🔄</span>Yükleniyor...</div>
    </div>

</div>

<!-- 3D Model Modal -->
<div id="model-modal" onclick="closeModal(event)">
    <div class="modal-inner">
        <button class="modal-close" onclick="closeModelModal()">✕</button>
        <model-viewer id="modal-viewer" auto-rotate camera-controls shadow-intensity="1" alt="3D Model"></model-viewer>
    </div>
</div>

<script>
// ────────────────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────────────────
let pollInterval  = null;

// ────────────────────────────────────────────────────────────
// Progress helpers
// ────────────────────────────────────────────────────────────
function showProgress(msg, pct, step) {
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('progress-message').textContent = msg;
    document.getElementById('progress-pct').textContent     = `%${pct}`;
    const fill = document.getElementById('progress-fill');
    fill.style.width = `${pct}%`;

    // Pulsing sadece aktif süreçte
    if (pct > 0 && pct < 100) fill.classList.add('pulsing');
    else fill.classList.remove('pulsing');

    if (step) document.getElementById('progress-step').textContent = step;
}
function hideProgress() {
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0%';
}

// ─────────────────────────────────────────────────────────────────
// BYOK API Key Helpers
// ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'tripo3d_api_key';

function saveApiKey(val) {
    const trimmed = val.trim();
    if (trimmed) { localStorage.setItem(STORAGE_KEY, trimmed); setKeyStatus(true); }
    else         { localStorage.removeItem(STORAGE_KEY);         setKeyStatus(false); }
}
function getApiKey()  { return (localStorage.getItem(STORAGE_KEY) || '').trim(); }
function setKeyStatus(active) {
    const el = document.getElementById('keyStatus');
    el.textContent = active ? '✓ Kendi anahtarin' : 'Sistem anahtari';
    el.className   = 'key-status ' + (active ? 'active' : 'inactive');
}
function toggleKeyVisibility() {
    const inp = document.getElementById('tripoApiKey');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ────────────────────────────────────────────────────────────
// Upload Flow
// ────────────────────────────────────────────────────────────
async function uploadGarment() {
    const fileInput  = document.getElementById('imageInput');
    const typeInput  = document.getElementById('garmentType');
    const uploadBtn  = document.getElementById('uploadBtn');
    const resultsDiv = document.getElementById('results');

    if (!fileInput.files || fileInput.files.length === 0) {
        alert('Lütfen bir resim seçin!');
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    formData.append('garment_type', typeInput.value);

    // BYOK: localStorage'dan anahtari al, varsa X-Tripo-Key header olarak gonder
    const userKey = getApiKey();
    const reqHeaders = userKey ? { 'X-Tripo-Key': userKey } : {};

    uploadBtn.disabled       = true;
    resultsDiv.style.display = 'none';
    showProgress(
        userKey ? '🔑 Kendi API anahtarinizla isleniyor...' : 'Fotograf sunucuya gonderiliyor...',
        5, 'Yukleme baslatildi'
    );

    try {
        const res = await fetch('/api/v1/garments/upload', {
            method: 'POST',
            headers: reqHeaders,
            body: formData,
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Yukleme hatasi');
        }
        const data = await res.json();
        showProgress('Kiyafetiniz isleme kuyruğuna alindi...', 10, `Job ID: ${data.job_id}`);

        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => checkStatus(data.job_id), 3000);
    } catch(err) {
        showProgress(`❌ Hata: ${err.message}`, 0, '');
        uploadBtn.disabled = false;
    }
}

// ────────────────────────────────────────────────────────────
// Status Polling
// ────────────────────────────────────────────────────────────
const STATUS_MESSAGES = {
    queued:     'İşlem kuyruğa alındı, worker bekleniyor...',
    processing: 'Kıyafetiniz 3D modele dönüştürülüyor... Lütfen bekleyin.',
    completed:  '🎉 İşlem tamamlandı!',
    failed:     '❌ İşlem başarısız oldu.',
};
const STEP_MESSAGES = {
    background_removal: '🖼️ Arka plan temizleniyor (rembg)...',
    tripo3d_conversion: '🧊 3D modele dönüştürülüyor (Tripo3D)...',
    completed:          '✅ Pipeline tamamlandı!',
    error:              '❌ Hata oluştu.',
};

async function checkStatus(jobId) {
    try {
        const res  = await fetch(`/api/v1/garments/jobs/${jobId}`);
        const data = await res.json();

        const pct     = data.progress || 0;
        const stepKey = data.current_step || '';
        const stepMsg = STEP_MESSAGES[stepKey] || stepKey || '';

        showProgress(
            STATUS_MESSAGES[data.status] || 'İşleniyor...',
            pct,
            stepMsg
        );

        if (data.status === 'completed') {
            clearInterval(pollInterval);
            document.getElementById('uploadBtn').disabled = false;
            showProgress('🎉 İşlem tamamlandı!', 100, '✅ Tüm adımlar başarıyla tamamlandı.');
            showResults(data);
            setTimeout(hideProgress, 2500);
            loadWardrobe();
        } else if (data.status === 'failed') {
            clearInterval(pollInterval);
            document.getElementById('uploadBtn').disabled = false;
            showProgress(`❌ Başarısız: ${data.error || 'Bilinmeyen hata'}`, 0, '');
            loadWardrobe();
        }
    } catch(err) {
        console.error('Durum sorgulanamadı:', err);
    }
}

// ────────────────────────────────────────────────────────────
// Show Active Job Results
// ────────────────────────────────────────────────────────────
function showResults(data) {
    const resultsDiv = document.getElementById('results');
    const imgEl      = document.getElementById('cleanedImage');
    const viewerEl   = document.getElementById('modelViewer');

    const cleanedUrl = data.cleaned_image_path || data.cleaned_image_url;
    const modelUrl   = data.model_path          || data.model_url;

    if (cleanedUrl) imgEl.src = resolveUrl(cleanedUrl);
    if (modelUrl)   viewerEl.src = resolveUrl(modelUrl);
    resultsDiv.style.display = 'grid';
}

function resolveUrl(u) {
    return u.startsWith('http') ? u : '/' + u.replace(/\\/g, '/');
}

// ────────────────────────────────────────────────────────────
// Wardrobe Gallery
// ────────────────────────────────────────────────────────────
async function loadWardrobe() {
    const grid = document.getElementById('wardrobe-grid');
    grid.innerHTML = '<div class="wardrobe-empty"><span>🔄</span>Yükleniyor...</div>';
    try {
        const res  = await fetch('/api/v1/garments/?limit=50');
        if (!res.ok) throw new Error('API hatası');
        const data = await res.json();

        if (!data.items || data.items.length === 0) {
            grid.innerHTML = '<div class="wardrobe-empty"><span>👗</span>Henüz kıyafet yüklenmedi.<br>İlk kıyafetinizi yükleyin!</div>';
            return;
        }
        grid.innerHTML = data.items.map(buildCard).join('');
    } catch(err) {
        grid.innerHTML = `<div class="wardrobe-empty"><span>⚠️</span>Gardırop yüklenemedi.<br>${esc(err.message)}</div>`;
    }
}

function buildCard(item) {
    const fav       = !!item.is_favorite;
    const favCls    = fav ? ' is-favorite' : '';
    const favIcon   = fav ? '⭐' : '🤍';
    const favTitle  = fav ? 'Favorilerden çıkar' : 'Favoriye ekle';

    const imgUrl  = item.cleaned_url || item.original_url;
    const imgHtml = imgUrl
        ? `<img src="${esc(imgUrl)}" alt="${esc(item.name)}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=card-img-placeholder>👕</span>'">`
        : `<span class="card-img-placeholder">👕</span>`;

    const errorHtml = (item.status === 'failed' && item.error_message)
        ? `<div class="card-error">⚠️ ${esc(item.error_message.substring(0,120))}${item.error_message.length>120?'…':''}</div>`
        : '';

    const modelBtn = (item.status === 'completed' && item.model_url)
        ? `<button class="card-model-btn" onclick="openModelModal('${esc(item.model_url)}')">🧊 3D Görüntüle</button>`
        : '';

    return `
    <div class="garment-card${favCls}" id="card-${item.id}">
        <span class="fav-star">⭐</span>
        <div class="card-img-wrap">${imgHtml}</div>
        <div class="card-body">
            <div class="card-name" id="name-${item.id}">${esc(item.name || 'İsimsiz Kıyafet')}</div>
            <div class="card-type">${esc(typeLabel(item.garment_type))}</div>
            ${statusBadge(item.status)}
            ${errorHtml}
            <div class="card-actions">
                ${modelBtn}
                <button class="icon-btn fav-btn"  title="${favTitle}"   onclick="toggleFav('${item.id}','${favCls?'false':'true'}')">${favIcon}</button>
                <button class="icon-btn edit-btn" title="İsim değiştir" onclick="renameGarment('${item.id}')">✏️</button>
                <button class="icon-btn del-btn"  title="Sil"           onclick="deleteGarment('${item.id}')">🗑️</button>
            </div>
        </div>
    </div>`;
}

function statusBadge(status) {
    const map = {
        queued:     ['badge-queued',     'Kuyrukta'],
        processing: ['badge-processing', 'İşleniyor'],
        completed:  ['badge-completed',  'Tamamlandı'],
        failed:     ['badge-failed',     'Başarısız'],
    };
    const [cls, label] = map[status] || ['badge-queued', status];
    return `<span class="badge ${cls}">${label}</span>`;
}

function typeLabel(t) {
    return {shirt:'Gömlek/T-Shirt',pants:'Pantolon',dress:'Elbise',jacket:'Ceket',skirt:'Etek'}[t]||t;
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ────────────────────────────────────────────────────────────
// Card Actions
// ────────────────────────────────────────────────────────────
async function toggleFav(id, newVal) {
    const isFav = newVal === 'true';
    try {
        const res = await fetch(`/api/v1/garments/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_favorite: isFav }),
        });
        if (!res.ok) throw new Error((await res.json()).detail);
        loadWardrobe();
    } catch(err) {
        alert(`Favori güncellenemedi: ${err.message}`);
    }
}

async function renameGarment(id) {
    const nameEl  = document.getElementById(`name-${id}`);
    const current = nameEl ? nameEl.textContent.trim() : '';
    const newName = prompt('Kıyafet için yeni isim girin:', current);
    if (newName === null || newName.trim() === current) return;

    try {
        const res = await fetch(`/api/v1/garments/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName.trim() || 'İsimsiz Kıyafet' }),
        });
        if (!res.ok) throw new Error((await res.json()).detail);
        if (nameEl) nameEl.textContent = newName.trim() || 'İsimsiz Kıyafet';
    } catch(err) {
        alert(`İsim güncellenemedi: ${err.message}`);
    }
}

async function deleteGarment(id) {
    if (!confirm('Bu kıyafeti gardıroptan silmek istediğinize emin misiniz?')) return;
    try {
        const res = await fetch(`/api/v1/garments/${id}`, { method: 'DELETE' });
        if (res.status === 204) {
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.style.transition = 'opacity .3s, transform .3s';
                card.style.opacity    = '0';
                card.style.transform  = 'scale(.9)';
                setTimeout(() => { card.remove(); }, 320);
            }
        } else {
            const err = await res.json();
            alert(`Silinemedi: ${err.detail}`);
        }
    } catch(err) {
        alert(`Silme hatası: ${err.message}`);
    }
}

// ────────────────────────────────────────────────────────────
// 3D Model Modal
// ────────────────────────────────────────────────────────────
function openModelModal(url) {
    document.getElementById('modal-viewer').src = url;
    document.getElementById('model-modal').classList.add('open');
}
function closeModelModal() {
    document.getElementById('model-modal').classList.remove('open');
    document.getElementById('modal-viewer').src = '';
}
function closeModal(event) {
    if (event.target.id === 'model-modal') closeModelModal();
}

// ────────────────────────────────────────────────────────────
// Init
// ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('results').style.display = 'none';

    // localStorage'dan kayitli API anahtarini yukle
    const saved = getApiKey();
    if (saved) {
        document.getElementById('tripoApiKey').value = saved;
        setKeyStatus(true);
    }

    loadWardrobe();
});
</script>
</body>
</html>
